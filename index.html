      backdrop-filter: blur(4px);

      border-color: #4f7df3;
    }

      max-width: 1400px;
      margin: 0 auto;
    }

      transition: transform 0.25s ease, box-shadow 0.3s;
      cursor: pointer;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4);
    }
    .project-card:hover {
      transform: translateY(-8px);
      border-color: #3b82f6;
      box-shadow: 0 25px 35px -12px #0f172a;
    }

      height: 210px;

      transition: 0.3s;

      padding: 22px 20px 24px;
    }

      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.2px;

      letter-spacing: 0.5px;
      border-left: 2px solid #3b82f6;

      border-left-color: #f97316;
    }

      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(3, 7, 18, 0.92);
      backdrop-filter: blur(12px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal-container {
      background: #0f172ae6;
      border-radius: 42px;
      max-width: 1200px;
      width: 92vw;
      max-height: 90vh;
      overflow-y: auto;
      overflow-x: hidden;
      border: 1px solid #3b82f670;
      box-shadow: 0 40px 70px rgba(0,0,0,0.7);
      animation: fadeUp 0.25s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 32px 12px;
      border-bottom: 1px solid #1e2a44;
    }
    .modal-header h2 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

      font-size: 38px;
      cursor: pointer;
      background: none;
      border: none;
      color: #94a3b8;
      transition: 0.2s;
      line-height: 1;

      color: #facc15;
    }

      display: flex;
      gap: 14px;
      flex-wrap: wrap;

      padding: 24px 32px;
    }
    .slider-wrapper {

      background: #020617;
      border-radius: 32px;
      overflow: hidden;
    }
    .slider-img {
      width: 100%;
      height: 460px;
      object-fit: contain;
      background: #0a0f1f;
      transition: 0.2s;
      display: block;
    }

    .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: #0f172abb;
      border: none;
      font-size: 32px;
      color: white;
      padding: 14px 18px;
      cursor: pointer;
      border-radius: 60px;
      backdrop-filter: blur(12px);
      transition: 0.2s;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slider-btn.next { right: 20px; }
    .slider-btn:hover {
      background: #3b82f6;
      transform: translateY(-50%) scale(1.05);

    .slider-btn:active {
      transform: translateY(-50%) scale(0.98);

        "Images/hr/hr10.jpeg",
        "Images/hr/hr11.jpeg",
        "Images/hr/hr12.jpeg",
        "Images/hr/hr13.jpeg",
        "Images/hr/hr14.jpeg",
      ]
    },
    {
      id: 11,
      name: "Lawyer System",
      categories: ["mobile"],
      description: "A mobile app for managing legal cases and client communications.",
      thumbnail: "Images/lawyer/lawyer14.jpeg",
      images: [
        "Images/lawyer/lawyer1.jpeg",
        "Images/lawyer/lawyer2.jpeg",
        "Images/lawyer/lawyer3.jpeg",
        "Images/lawyer/lawyer4.jpeg",
        "Images/lawyer/lawyer5.jpeg",
        "Images/lawyer/lawyer6.jpeg",
        "Images/lawyer/lawyer7.jpeg",
        "Images/lawyer/lawyer8.jpeg",
        "Images/lawyer/lawyer9.jpeg",
        "Images/lawyer/lawyer10.jpeg",
        "Images/lawyer/lawyer11.jpeg",
        "Images/lawyer/lawyer12.jpeg",
        "Images/lawyer/lawyer13.jpeg",
      ]
    }
  ];

  // ------------------- GLOBALS FOR MODAL SLIDER ------------------
  let currentProjectImages = [];
  let currentImageIndex = 0;

  // DOM elements
  const projectsContainer = document.getElementById("projectsGrid");
  const modalOverlay = document.getElementById("modalOverlay");
  const modalTitle = document.getElementById("modalTitle");
  const modalCategoriesContainer = document.getElementById("modalCategories");
  const modalDescription = document.getElementById("modalDescription");
  const modalSliderImg = document.getElementById("modalSliderImg");
  const imageCounterSpan = document.getElementById("imageCounter");
  const closeModalBtn = document.getElementById("closeModalBtn");
  const prevBtn = document.getElementById("prevSlideBtn");
  const nextBtn = document.getElementById("nextSlideBtn");

  function closeModal() {
    modalOverlay.style.display = "none";
    document.body.style.overflow = "auto";
  }

  function updateSliderImage() {
    if (currentProjectImages.length === 0) return;
    modalSliderImg.src = currentProjectImages[currentImageIndex];
    if (imageCounterSpan) {
      imageCounterSpan.innerText = `${currentImageIndex + 1} / ${currentProjectImages.length}`;
    }
  }

  function nextSlide() {
    if (!currentProjectImages.length) return;
    currentImageIndex = (currentImageIndex + 1) % currentProjectImages.length;
    updateSliderImage();
  }

  function prevSlide() {
    if (!currentProjectImages.length) return;
    currentImageIndex = (currentImageIndex - 1 + currentProjectImages.length) % currentProjectImages.length;
    updateSliderImage();
  }

  function openProjectModal(projectId) {
    const project = projectsData.find(p => p.id === projectId);
    if (!project) return;

    modalTitle.innerText = project.name;
    modalDescription.innerText = project.description;

    const catMap = { web: "🌐 Web App", mobile: "📱 Mobile App", wordpress: "📰 WordPress" };
    modalCategoriesContainer.innerHTML = project.categories.map(cat => {
      let extraClass = cat === "wordpress" ? "wordpress" : "";
      return `<span class="cat-badge ${extraClass}">${catMap[cat] || cat}</span>`;
    }).join('');

    currentProjectImages = [...project.images];
    if (!currentProjectImages.length) currentProjectImages = ["https://picsum.photos/id/0/800/500"];
    currentImageIndex = 0;
    updateSliderImage();

    modalOverlay.style.display = "flex";
    document.body.style.overflow = "hidden";
  }

  function renderProjects() {
    let filteredProjects = [];
    if (activeFilter === "all") {
      filteredProjects = projectsData;
    } else {
      filteredProjects = projectsData.filter(project => 
        project.categories.includes(activeFilter)
      );
    }

    if (filteredProjects.length === 0) {
      projectsContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px;">✨ No projects in this category yet. Try another filter!</div>`;
      return;
    }

    projectsContainer.innerHTML = filteredProjects.map(project => {
      const catDisplay = project.categories.map(c => {
        let icon = c === 'web' ? '🌐' : (c === 'mobile' ? '📱' : '📰');
        let label = c === 'wordpress' ? 'WordPress' : (c === 'web' ? 'Web' : 'Mobile');
        return `<span class="cat-badge ${c === 'wordpress' ? 'wordpress' : ''}">${icon} ${label}</span>`;
      }).join('');
      
      return `
        <div class="project-card" data-id="${project.id}">
          <img class="card-img" src="${project.thumbnail}" alt="${project.name}" loading="lazy" onerror="this.src='https://picsum.photos/id/1/400/260'">
          <div class="card-info">
            <h3>${project.name}</h3>
            <div class="category-tags">
              ${catDisplay}
            </div>
          </div>
        </div>
      `;
    }).join('');

    document.querySelectorAll('.project-card').forEach(card => {
      const idAttr = card.getAttribute('data-id');
      if (idAttr) {
        card.addEventListener('click', (e) => {
          e.stopPropagation();
          openProjectModal(parseInt(idAttr));
        });
      }
    });
  }

  let activeFilter = "all";
  const filterBtns = document.querySelectorAll('.filter-btn');
  function setActiveFilter(filterValue) {
    activeFilter = filterValue;
    filterBtns.forEach(btn => {
      const btnFilter = btn.getAttribute('data-filter');
      if (btnFilter === filterValue) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });
    renderProjects();
  }

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const filterValue = btn.getAttribute('data-filter');
      setActiveFilter(filterValue);
    });
  });

  closeModalBtn.addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', (e) => {
    if (e.target === modalOverlay) closeModal();
  });
  prevBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    prevSlide();
  });
  nextBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    nextSlide();
  });

  document.addEventListener('keydown', (e) => {
    if (modalOverlay.style.display === 'flex') {
      if (e.key === 'ArrowLeft') {
        prevSlide();
        e.preventDefault();
      } else if (e.key === 'ArrowRight') {
        nextSlide();
        e.preventDefault();
      } else if (e.key === 'Escape') {
        closeModal();
        e.preventDefault();
      }
    }
  });

  renderProjects();
</script>
</body>
</html>
